<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>ARCAEGIUM</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Exo+2:ital,wght@0,200;0,300;0,400;1,200&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ── */
    :root {
      --void:        #03050a;
      --panel:       rgba(6,14,26,0.88);
      --line:        rgba(100,160,220,0.10);
      --line-bright: rgba(100,160,220,0.28);
      --ui:          #7ab8e0;
      --ui-glow:     rgba(122,184,224,0.15);
      --white:       #ddeeff;
      --dim:         rgba(221,238,255,0.35);
      --steam:       #ff9a45;
      --steam-glow:  rgba(255,154,69,0.22);
      --cyber:       #00ffe7;
      --cyber-glow:  rgba(0,255,231,0.22);
      --chaos-a:     #c724ff;
      --chaos-b:     #39ff6e;
      --chaos-c:     #ff2d6f;
      --chaos-d:     #ffe847;
      --footer-h:    44px;
    }

    /* ── RESET ── */
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

    html,body {
      width:100%; min-height:100%;
      background:var(--void);
      color:var(--white);
      font-family:'Exo 2',sans-serif;
      font-weight:300;
      overflow-x:hidden;
      padding-bottom:var(--footer-h);
    }

    /* ── CANVAS LAYERS ── */
    .star-layer {
      position:fixed; inset:0; z-index:0; pointer-events:none;
    }
    #layer0 { z-index:0; }
    #layer1 { z-index:1; }
    #layer2 { z-index:2; }
    #fxCanvas { position:fixed; inset:0; z-index:3; pointer-events:none; }

    /* ── GRID ── */
    .grid {
      position:fixed; inset:0; z-index:4; pointer-events:none;
      background-image:
        linear-gradient(var(--line) 1px,transparent 1px),
        linear-gradient(90deg,var(--line) 1px,transparent 1px);
      background-size:64px 64px;
      mask-image:radial-gradient(ellipse 90% 90% at 50% 40%,black 20%,transparent 100%);
    }
    .grid::after {
      content:''; position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(199,36,255,0.045) 1px,transparent 1px),
        linear-gradient(90deg,rgba(57,255,110,0.03) 1px,transparent 1px);
      background-size:64px 64px; background-position:32px 32px;
      animation:gridDrift 18s ease-in-out infinite alternate; opacity:0;
    }
    @keyframes gridDrift {
      0%   { opacity:0; transform:translate(0,0); }
      40%  { opacity:1; } 60% { opacity:1; }
      100% { opacity:0; transform:translate(6px,-4px); }
    }

    /* ── CORNER BRACKETS ── */
    .corner {
      position:fixed; z-index:10; width:40px; height:40px; pointer-events:none;
    }
    .corner--tl { top:16px; left:16px;
      border-top:1px solid var(--line-bright); border-left:1px solid var(--line-bright); }
    .corner--tr { top:16px; right:16px;
      border-top:1px solid var(--line-bright); border-right:1px solid var(--line-bright);
      animation:cornerChaos 14s ease-in-out infinite; }
    .corner--bl { bottom:calc(var(--footer-h) + 16px); left:16px;
      border-bottom:1px solid var(--line-bright); border-left:1px solid var(--line-bright); }
    .corner--br { bottom:calc(var(--footer-h) + 16px); right:16px;
      border-bottom:1px solid var(--line-bright); border-right:1px solid var(--line-bright); }
    @keyframes cornerChaos {
      0%,80%,100% { border-color:var(--line-bright); box-shadow:none; }
      85%  { border-color:var(--chaos-a); box-shadow:2px -2px 8px var(--chaos-a); }
      90%  { border-color:var(--line-bright); box-shadow:none; }
      93%  { border-color:var(--chaos-b); box-shadow:2px -2px 8px var(--chaos-b); }
      97%  { border-color:var(--line-bright); box-shadow:none; }
    }

    /* ── FIXED HUD FOOTER ── */
    .hud-footer {
      position:fixed; bottom:0; left:0; right:0;
      height:var(--footer-h); z-index:100;
      background:rgba(3,5,10,0.92);
      border-top:1px solid var(--line-bright);
      display:flex; align-items:center;
      justify-content:space-between;
      padding:0 1.5rem; gap:1rem;
      backdrop-filter:blur(4px);
    }
    .hud-footer::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(to right,transparent,var(--line-bright) 20%,var(--chaos-a) 50%,var(--line-bright) 80%,transparent);
      opacity:0.6;
    }
    .hud-val {
      font-family:'Share Tech Mono',monospace;
      font-size:0.6rem; letter-spacing:0.18em;
      color:var(--ui); opacity:0.5; white-space:nowrap;
    }
    .hud-val.live { opacity:0.7; }
    .hud-val a { color:inherit; text-decoration:none; }
    .hud-val a:hover { opacity:1; }
    .hud-status { display:flex; align-items:center; gap:0.5rem; }
    .status-dot {
      display:inline-block; width:5px; height:5px; border-radius:50%;
      background:var(--chaos-b); box-shadow:0 0 6px var(--chaos-b);
      animation:dotPulse 2s ease-in-out infinite; flex-shrink:0;
    }
    @keyframes dotPulse {
      0%,100% { opacity:0.6; }
      50%     { opacity:1; box-shadow:0 0 10px var(--chaos-b); }
    }
    .hud-chaos { animation:hudChaos 11s ease-in-out infinite; }
    @keyframes hudChaos {
      0%,88%,100% { opacity:0.5; color:var(--ui); }
      90%  { opacity:0.9; color:var(--chaos-a); }
      93%  { opacity:0.5; color:var(--ui); }
      95%  { opacity:0.7; color:var(--chaos-d); }
      97%  { opacity:0.5; color:var(--ui); }
    }

    /* ── PAGE ── */
    .page {
      position:relative; z-index:5;
      min-height:100vh;
      display:flex; flex-direction:column; align-items:center;
      padding:0 3rem 4rem;
      max-width:1400px; margin:0 auto;
    }

    /* ── HEADER ── */
    header {
      text-align:center; padding:5rem 0 1rem; width:100%;
      opacity:0; animation:riseIn 1.2s cubic-bezier(0.16,1,0.3,1) forwards 0.2s;
    }
    .coord-bar {
      display:flex; justify-content:center; gap:2rem; margin-bottom:1.8rem;
      font-family:'Share Tech Mono',monospace;
      font-size:0.65rem; letter-spacing:0.18em; color:var(--ui); opacity:0.45;
    }
    .coord-bar span { animation:coordFlicker 7s ease-in-out infinite; }
    .coord-bar span:nth-child(2) { animation-delay:2.3s; color:var(--chaos-a); opacity:0.6; }
    .coord-bar span:nth-child(3) { animation-delay:4.7s; }
    @keyframes coordFlicker {
      0%,90%,100% { opacity:0.45; }
      92% { opacity:0.9; } 94% { opacity:0.2; } 96% { opacity:0.85; }
    }

    h1 {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(2.6rem,9vw,6.5rem);
      font-weight:900; letter-spacing:0.12em;
      color:var(--white);
      text-shadow:0 0 30px rgba(122,184,224,0.4),0 0 80px rgba(122,184,224,0.12);
      line-height:1; position:relative; user-select:none;
    }
    h1::before,h1::after {
      content:'ARCAEGIUM';
      position:absolute; top:0; left:0; width:100%;
      font-family:'Orbitron',sans-serif; font-weight:900; letter-spacing:0.12em;
      pointer-events:none;
    }
    h1::before {
      color:var(--chaos-c);
      clip-path:polygon(0 15%,100% 15%,100% 45%,0 45%);
      animation:chromaA 7s infinite; opacity:0;
    }
    h1::after {
      color:var(--cyber);
      clip-path:polygon(0 50%,100% 50%,100% 78%,0 78%);
      animation:chromaB 7s infinite; opacity:0;
    }
    @keyframes chromaA {
      0%,82%,100% { opacity:0; transform:translate(0,0); }
      84% { opacity:0.85; transform:translate(-5px,2px); }
      86% { opacity:0; }
      88% { opacity:0.6; transform:translate(4px,-2px); }
      90% { opacity:0; }
    }
    @keyframes chromaB {
      0%,82%,100% { opacity:0; transform:translate(0,0); }
      87% { opacity:0.75; transform:translate(5px,2px); }
      89% { opacity:0; }
      91% { opacity:0.5; transform:translate(-3px,-1px); }
      93% { opacity:0; }
    }
    h1 .tc { display:inline-block; animation:titleColorFlick 6s ease-in-out infinite; }
    h1 .tc:nth-child(2n) { animation-delay:0.4s; }
    h1 .tc:nth-child(3n) { animation-delay:0.9s; }
    h1 .tc:nth-child(4n) { animation-delay:1.4s; }
    h1 .tc:nth-child(5n) { animation-delay:2.1s; }
    @keyframes titleColorFlick {
      0%,88%,100% { color:var(--white); }
      90% { color:var(--chaos-a); }
      92% { color:var(--white); }
      94% { color:var(--cyber); }
      96% { color:var(--white); }
    }

    .sub {
      font-family:'Share Tech Mono',monospace;
      font-size:clamp(0.58rem,1.5vw,0.76rem); letter-spacing:0.38em;
      color:var(--ui); opacity:0.5; margin-top:1.1rem; text-transform:uppercase;
    }
    .hline {
      width:100%; max-width:700px; height:1px; margin:2.5rem auto;
      background:linear-gradient(to right,transparent,var(--line-bright) 20%,var(--chaos-a) 50%,var(--line-bright) 80%,transparent);
      opacity:0.45; position:relative;
    }
    .hline::after {
      content:''; position:absolute; top:-1px; left:50%; transform:translateX(-50%);
      width:6px; height:3px;
      background:var(--chaos-a); box-shadow:0 0 8px var(--chaos-a);
      animation:linePulse 4s ease-in-out infinite;
    }
    @keyframes linePulse {
      0%,100% { opacity:0.6; width:6px; }
      50%     { opacity:1; width:10px; }
    }
    .intro {
      font-size:clamp(0.8rem,1.8vw,0.95rem); font-weight:200;
      letter-spacing:0.1em; color:var(--dim);
      max-width:520px; text-align:center; line-height:2; font-style:italic;
      margin:0 auto;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      margin:4rem 0 2rem; display:flex; align-items:center; gap:1rem; width:100%;
      opacity:0; animation:riseIn 0.8s ease forwards 1.2s;
    }
    .section-label .tick {
      flex:1; height:1px; max-width:120px;
      background:linear-gradient(to right,transparent,var(--line-bright));
    }
    .section-label .tick:last-child {
      background:linear-gradient(to left,transparent,var(--line-bright));
    }
    .section-label span {
      font-family:'Share Tech Mono',monospace;
      font-size:0.65rem; letter-spacing:0.4em;
      color:var(--ui); opacity:0.6; text-transform:uppercase; white-space:nowrap;
    }

    /* ── PORTAL CARDS ── */
    .portals {
      display:flex; flex-direction:column; gap:2rem; width:100%;
    }

    .portal {
      position:relative;
      display:grid;
      grid-template-columns:1fr 420px;
      min-height:320px;
      background:var(--panel);
      border:1px solid var(--line-bright);
      text-decoration:none; color:inherit;
      overflow:hidden;
      transition:transform 0.35s cubic-bezier(0.16,1,0.3,1),
                 border-color 0.3s, box-shadow 0.3s;
      opacity:0; animation:riseIn 0.7s ease forwards;
      clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,0 100%);
    }
    /* notch fill */
    .portal::before {
      content:''; position:absolute; top:0; right:0;
      width:0; height:0; border-style:solid;
      border-width:0 21px 21px 0;
      border-color:transparent var(--void) transparent transparent;
      z-index:4;
    }

    /* hover — known portals */
    a.portal:hover { transform:translateY(-4px); }
    a.portal:hover {
      border-color:var(--card-accent,var(--ui));
      box-shadow:0 8px 50px var(--card-glow,var(--ui-glow)),
                 inset 0 0 30px rgba(0,0,0,0.3);
    }

    /* cycling border for unknown cards */
    .portal-cycle {
      animation:riseIn 0.7s ease forwards, borderCycle 9s linear infinite;
    }
    .portal-cycle .portal-accent-line {
      animation:accentCycle 9s linear infinite;
    }
    /* offset second unknown card */
    .portal-cycle:nth-of-type(even) {
      animation:riseIn 0.7s ease forwards, borderCycle 9s linear infinite 4.5s;
    }
    .portal-cycle:nth-of-type(even) .portal-accent-line {
      animation:accentCycle 9s linear infinite 4.5s;
    }
    @keyframes borderCycle {
      0%   { border-color:#c724ff; box-shadow:0 0 12px rgba(199,36,255,0.25); }
      14%  { border-color:#ff2d6f; box-shadow:0 0 12px rgba(255,45,110,0.25); }
      28%  { border-color:#ff9a45; box-shadow:0 0 12px rgba(255,154,69,0.25); }
      42%  { border-color:#ffe847; box-shadow:0 0 12px rgba(255,232,71,0.25); }
      57%  { border-color:#39ff6e; box-shadow:0 0 12px rgba(57,255,110,0.25); }
      71%  { border-color:#00ffe7; box-shadow:0 0 12px rgba(0,255,231,0.25); }
      85%  { border-color:#7b6fff; box-shadow:0 0 12px rgba(123,111,255,0.25); }
      100% { border-color:#c724ff; box-shadow:0 0 12px rgba(199,36,255,0.25); }
    }
    @keyframes accentCycle {
      0%   { background:#c724ff; box-shadow:0 0 10px rgba(199,36,255,0.5); }
      14%  { background:#ff2d6f; box-shadow:0 0 10px rgba(255,45,110,0.5); }
      28%  { background:#ff9a45; box-shadow:0 0 10px rgba(255,154,69,0.5); }
      42%  { background:#ffe847; box-shadow:0 0 10px rgba(255,232,71,0.5); }
      57%  { background:#39ff6e; box-shadow:0 0 10px rgba(57,255,110,0.5); }
      71%  { background:#00ffe7; box-shadow:0 0 10px rgba(0,255,231,0.5); }
      85%  { background:#7b6fff; box-shadow:0 0 10px rgba(123,111,255,0.5); }
      100% { background:#c724ff; box-shadow:0 0 10px rgba(199,36,255,0.5); }
    }

    /* card sub-elements */
    .card-flicker { position:absolute; inset:0; pointer-events:none; z-index:10; opacity:0; }
    .card-flicker.firing { animation:cardFlicker 1.2s forwards; }
    @keyframes cardFlicker {
      0%  { opacity:0; }
      4%  { opacity:1; background:repeating-linear-gradient(0deg,rgba(0,0,0,0.92) 0px,rgba(0,0,0,0.92) 2px,transparent 2px,transparent 5px); }
      8%  { opacity:0.2; background:rgba(199,36,255,0.07); }
      10% { opacity:1; background:repeating-linear-gradient(0deg,rgba(0,0,0,0.88) 0px,rgba(0,0,0,0.88) 1px,transparent 1px,transparent 4px); }
      16% { opacity:0; background:transparent; }
      18% { opacity:0.9; background:repeating-linear-gradient(90deg,rgba(0,0,0,0.85) 0px,rgba(0,0,0,0.85) 2px,transparent 2px,transparent 6px); }
      22% { opacity:0; background:transparent; }
      24% { opacity:0.7; background:rgba(0,255,231,0.05); }
      28% { opacity:1; background:repeating-linear-gradient(0deg,rgba(0,0,0,0.9) 0px,rgba(0,0,0,0.9) 3px,transparent 3px,transparent 7px); }
      36% { opacity:0; background:transparent; }
      45%,100% { opacity:0; }
    }
    .card-static {
      position:absolute; inset:0; pointer-events:none; z-index:11;
      opacity:0; display:flex; align-items:center; justify-content:center;
    }
    .card-static.firing { animation:cardStatic 1.2s forwards; }
    @keyframes cardStatic {
      0%,100% { opacity:0; }
      6%  { opacity:1; } 8%  { opacity:0; }
      12% { opacity:0.8; } 14% { opacity:0; }
      20% { opacity:0.6; } 22% { opacity:0; }
      30% { opacity:0.4; } 32% { opacity:0; }
    }
    .card-static-txt {
      font-family:'Share Tech Mono',monospace;
      font-size:0.65rem; letter-spacing:0.4em;
      color:rgba(255,45,110,0.9); text-transform:uppercase;
    }

    .portal-accent-line {
      position:absolute; top:0; left:0; right:21px; height:2px;
      background:var(--card-accent,var(--ui));
      box-shadow:0 0 10px var(--card-glow,var(--ui-glow));
      transition:box-shadow 0.3s; z-index:3;
    }
    a.portal:hover .portal-accent-line {
      box-shadow:0 0 26px var(--card-glow,var(--ui-glow));
    }

    .portal-wash {
      position:absolute; inset:0;
      background:radial-gradient(ellipse 60% 80% at 30% 50%,var(--card-glow,var(--ui-glow)) 0%,transparent 70%);
      opacity:0; transition:opacity 0.4s; pointer-events:none; z-index:1;
    }
    a.portal:hover .portal-wash { opacity:1; }

    /* ── TEXT PANEL ── */
    .portal-text {
      position:relative; z-index:2;
      padding:2.5rem 2.5rem 2rem;
      display:flex; flex-direction:column; justify-content:center; gap:0.8rem;
    }
    .portal-id {
      font-family:'Share Tech Mono',monospace;
      font-size:0.6rem; letter-spacing:0.3em;
      color:var(--card-accent,var(--ui)); opacity:0.6;
      display:flex; align-items:center; gap:0.6rem;
    }
    .portal-id::after {
      content:''; flex:1; height:1px;
      background:linear-gradient(to right,var(--card-accent,var(--ui)),transparent);
      opacity:0.3;
    }
    .portal-name {
      display:block; width:100%; height:2em;
      overflow:hidden; position:relative; user-select:none;
    }
    .portal-name .name-inner {
      position:absolute; top:0; left:0; white-space:nowrap;
      font-family:'Orbitron',sans-serif;
      font-size:clamp(1.2rem,2.8vw,1.7rem);
      font-weight:700; letter-spacing:0.06em; line-height:2em;
      color:var(--white);
      text-shadow:0 0 20px var(--card-glow,var(--ui-glow));
      width:100%;
    }
    .name-inner .sc { display:inline-block; text-align:center; overflow:hidden; }
    .portal-desc {
      font-size:0.9rem; font-weight:200;
      letter-spacing:0.05em; color:var(--dim);
      line-height:1.85; margin-top:0.4rem; max-width:560px;
    }
    .portal-tag {
      display:inline-flex; align-items:center; gap:0.4rem;
      margin-top:0.8rem; padding:0.3rem 0.8rem;
      font-family:'Share Tech Mono',monospace;
      font-size:0.6rem; letter-spacing:0.25em; text-transform:uppercase;
      border:1px solid var(--card-accent,var(--ui));
      color:var(--card-accent,var(--ui)); opacity:0.65;
      align-self:flex-start;
    }
    .portal-tag::before { content:'▸'; font-size:0.5rem; }

    /* ── IMAGE PANEL ── */
    .portal-image {
      position:relative; overflow:hidden;
      border-left:1px solid var(--card-accent,var(--line-bright));
    }
    .portal-image img {
      width:100%; height:100%; object-fit:cover; display:block;
      transition:transform 0.6s ease;
      filter:brightness(0.85) saturate(1.1);
    }
    a.portal:hover .portal-image img { transform:scale(1.04); }
    .portal-image::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 1px,transparent 1px,transparent 3px);
    }
    .portal-image::before {
      content:''; position:absolute; inset:0; z-index:1; pointer-events:none;
      background:linear-gradient(to right,rgba(6,14,26,0.5) 0%,transparent 30%,transparent 70%,rgba(6,14,26,0.2) 100%);
    }

    /* ── CSS PLACEHOLDERS ── */
    .portal-placeholder { width:100%; height:100%; position:relative; overflow:hidden; }

    .placeholder-cyber { background:#000d14; }
    .placeholder-cyber::before {
      content:''; position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(0,255,231,0.08) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,255,231,0.08) 1px,transparent 1px);
      background-size:24px 24px;
      animation:cyberGridPulse 4s ease-in-out infinite alternate;
    }
    @keyframes cyberGridPulse {
      0% { opacity:0.5; } 100% { opacity:1; background-size:26px 26px; }
    }
    .placeholder-cyber::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(0,255,231,0.12) 0%,transparent 70%);
      animation:cyberPulse 3s ease-in-out infinite alternate;
    }
    @keyframes cyberPulse { 0% { opacity:0.4; } 100% { opacity:1; } }

    .placeholder-void1 { background:#0d0014; }
    .placeholder-void1::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(199,36,255,0.18) 0%,transparent 65%);
      animation:voidPulse1 5s ease-in-out infinite alternate;
    }
    @keyframes voidPulse1 {
      0% { transform:scale(0.9); opacity:0.5; } 100% { transform:scale(1.1); opacity:1; }
    }
    .placeholder-void1::after {
      content:''; position:absolute; inset:0;
      background-image:radial-gradient(circle,rgba(199,36,255,0.15) 1px,transparent 1px);
      background-size:30px 30px; opacity:0.4;
    }

    .placeholder-void2 { background:#001409; }
    .placeholder-void2::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(57,255,110,0.15) 0%,transparent 65%);
      animation:voidPulse2 6s ease-in-out infinite alternate;
    }
    @keyframes voidPulse2 {
      0% { transform:scale(1.1); opacity:0.4; } 100% { transform:scale(0.9); opacity:1; }
    }
    .placeholder-void2::after {
      content:''; position:absolute; inset:0;
      background-image:radial-gradient(circle,rgba(57,255,110,0.12) 1px,transparent 1px);
      background-size:28px 28px; opacity:0.4;
    }

    /* ── PAGE FOOTER ── */
    footer {
      margin-top:3rem; text-align:center; width:100%;
      opacity:0; animation:riseIn 0.8s ease forwards 2s;
    }
    .footer-line {
      width:200px; height:1px; margin:0 auto 1.2rem;
      background:linear-gradient(to right,transparent,var(--line-bright),transparent);
    }
    .footer-text {
      font-family:'Share Tech Mono',monospace;
      font-size:0.6rem; letter-spacing:0.3em; color:var(--ui); opacity:0.3;
    }

    /* ── ANIMATIONS ── */
    @keyframes riseIn {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width:900px) {
      .portal { grid-template-columns:1fr; grid-template-rows:auto 280px; }
      .portal-image { border-left:none; border-top:1px solid var(--card-accent,var(--line-bright)); }
    }
    @media (max-width:600px) {
      .page { padding:0 1rem 3rem; }
      header { padding:3.5rem 0 1rem; }
      .coord-bar { gap:1rem; flex-wrap:wrap; }
      .hud-footer { gap:0.5rem; padding:0 0.8rem; }
      .hud-val { font-size:0.5rem; }
    }
  </style>
</head>
<body>

  <!-- parallax star layers -->
  <canvas id="layer0" class="star-layer"></canvas>
  <canvas id="layer1" class="star-layer"></canvas>
  <canvas id="layer2" class="star-layer"></canvas>
  <!-- fx: nebulae + scanlines + pings -->
  <canvas id="fxCanvas"></canvas>

  <div class="grid"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="page">

    <header>
      <div class="coord-bar">
        <span id="coordLeft"></span>
        <span id="coordCenter"></span>
        <span id="coordRight"></span>
      </div>
      <h1 id="mainTitle"></h1>
      <p class="sub" id="taglineSub"></p>
      <div class="hline"></div>
      <p class="intro" id="introText"></p>
    </header>

    <div class="section-label">
      <div class="tick"></div>
      <span id="portalsLabel"></span>
      <div class="tick"></div>
    </div>

    <div class="portals" id="portalsContainer">
      <!-- injected by main.js -->
    </div>

    <footer>
      <div class="footer-line"></div>
      <p class="footer-text" id="footerCredit"></p>
    </footer>

  </div>

  <!-- fixed HUD footer -->
  <div class="hud-footer">
    <div class="hud-status">
      <span class="status-dot"></span>
      <span class="hud-val" id="hudStatus"></span>
    </div>
    <span class="hud-val live" id="liveTime">--:--:-- UTC</span>
    <span class="hud-val hud-chaos" id="dimFreq">DIM-FREQ: ---.--- THz</span>
    <span class="hud-val" id="realityIdx">REALITY-IDX: 0x----</span>
    <span class="hud-val hud-chaos" id="entropyVal">ENTROPY: --.---- %</span>
    <span class="hud-val"><a id="hudGithub" href="#" target="_blank" rel="noopener"></a></span>
  </div>

  <script src="js/main.js"></script>

</body>
</html>
